data:
  x_train_path: data/X_train_final.csv
  y_train_path: data/y_train_final.csv
  x_val_path: data/X_val.csv
  y_val_path: data/y_val.csv
  target_column: readmitted_30d

model:
  name: xgboost_basic
  random_state: 42
  params:
    objective: binary:logistic
    eval_metric: logloss
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 3
    min_child_weight: 1
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    tree_method: hist
    n_jobs: -1

training:
  threshold: 0.5
  early_stopping_rounds: 30
  verbose: false

outputs:
  model_dir: models
  report_dir: reports
  plot_dir: reports/figures
  model_filename: xgboost_basic.joblib
  metrics_filename: xgboost_basic_metrics.json
  predictions_filename: xgboost_basic_val_predictions.csv
