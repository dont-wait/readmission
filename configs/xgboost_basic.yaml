data:
  x_train_path: data/X_train_final.csv
  y_train_path: data/y_train_final.csv
  x_val_path: data/X_val.csv
  y_val_path: data/y_val.csv
  x_test_path: data/X_test_final.csv
  y_test_path: data/y_test_final.csv
  target_column: readmitted_30d

model:
  name: xgboost_basic
  random_state: 42
  params:
    objective: binary:logistic
    eval_metric: logloss
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 3
    min_child_weight: 1
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    tree_method: hist
    n_jobs: -1

training:
  threshold: 0.5
  early_stopping_rounds: 30
  verbose: false

outputs:
  model_dir: models
  report_dir: reports/base
  plot_dir: reports/base/figures
  improved_report_dir: reports/improved
  improved_plot_dir: reports/improved/figures
  improved_output_prefix: ""
  logistic_report_dir: reports/logistic
  logistic_plot_dir: reports/logistic/figures
  model_filename: xgboost_basic.joblib
  metrics_filename: validation_metrics.json
  predictions_filename: validation_predictions.csv
  test_metrics_filename: test_metrics.json
  test_predictions_filename: test_predictions.csv
